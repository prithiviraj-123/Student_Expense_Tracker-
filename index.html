<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Expense Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Student Expense Tracker</h1>

<div class="summary">
    <div>Balance: <span id="balance">₹0</span></div>
    <div>Income: <span id="income">₹0</span></div>
    <div>Expense: <span id="expense">₹0</span></div>
</div>

<div class="form">
    <input id="description" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount">
    <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>
    <button onclick="addTransaction()">Add</button>
</div>

<div class="controls">
    <input id="search" placeholder="Search..." oninput="searchTransaction()">
    <select id="filter" onchange="filterTransactions()">
        <option value="all">All</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>
</div>

<ul id="transaction-list"></ul>

<script src="script.js"></script>
</body>
</html>
